# Baseline experiment configuration for web-Stanford dataset
# Smallest dataset for quick testing

dataset: web-Stanford
sampler: uniform
sample_fractions: [0.001, 0.005, 0.01, 0.05, 0.1]

estimators:
  - german_tank
  - spacing
  - rank_inversion
  - hyperloglog
  - flajolet_martin
  - mincount

distortions:
  offset: 0
  gap_fraction: 0

num_repeats: 100
random_seed: 42
output: results/web_stanford_baseline.json
